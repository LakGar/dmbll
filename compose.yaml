services:
  db:
    image: postgres:17
    container_name: calorie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: calorie_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
